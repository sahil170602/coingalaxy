workflows:
  android-workflow:
    name: Coin Galaxy Android APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - supabase_keys
        android_signing 
      node: latest
      java: 21
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Web Assets
        script: npm run build
      - name: Sync Capacitor
        script: |
          npx cap sync android
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - sahilmeshram1917@gmail.com
